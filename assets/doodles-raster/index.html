<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>原图装饰化预览</title>
  <style>
    :root{color-scheme:light dark;--bg:#fbf4e8;--surface:#fffdf8;--text:#2a1d17;--muted:#715f52;--border:#e2cdae;--cell:#6a710b;--cellText:#fff7d5}
    @media (prefers-color-scheme:dark){:root{--bg:#18110d;--surface:#241812;--text:#fff0df;--muted:#d5bda1;--border:#57402f;--cell:#384009;--cellText:#fff0df}}
    *{box-sizing:border-box} body{margin:0;padding:32px;font-family:"Source Han Sans SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    h1{font-size:22px;margin:0 0 8px} p{margin:0 0 24px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;max-width:980px}
    figure{margin:0;padding:18px;border:1px solid var(--border);background:var(--surface)}
    figure img{display:block;width:100%;aspect-ratio:1/1;object-fit:contain;background:linear-gradient(45deg,rgba(0,0,0,.035) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.035) 75%),linear-gradient(45deg,rgba(0,0,0,.035) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.035) 75%);background-size:18px 18px;background-position:0 0,9px 9px}
    figcaption{margin-top:12px;font-size:14px;color:var(--muted)}
    .samples{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;max-width:980px;margin-top:30px}
    .cell{min-height:190px;padding:14px;border:1px solid rgba(0,0,0,.12);background:var(--cell);color:var(--cellText);position:relative;overflow:hidden;box-shadow:inset 0 -26px 34px rgba(0,0,0,.08)}
    .cell strong{display:block;font-size:17px;line-height:1.25}.cell span{display:block;margin-top:4px;font-size:14px;line-height:1.35}.cell img{position:absolute;right:4px;bottom:0;width:112px;max-height:118px;object-fit:contain;opacity:.2;filter:saturate(.82);pointer-events:none}
    .cell:nth-child(2){background:#2f6782}.cell:nth-child(3){background:#755e12}.cell:nth-child(4){background:#395f57}
  </style>
</head>
<body>
  <h1>原图装饰化预览</h1>
  <p>不重画形象，只裁剪、去背景、柔化颜色；下方模拟低透明度课表装饰效果。</p>
  <div class="grid">
    <figure><img src="bear-front.png" alt="正视小熊"><figcaption>bear-front.png</figcaption></figure>
    <figure><img src="deer.png" alt="小鹿"><figcaption>deer.png</figcaption></figure>
    <figure><img src="robot.png" alt="机器人"><figcaption>robot.png</figcaption></figure>
    <figure><img src="chick.png" alt="小黄鸡"><figcaption>chick.png</figcaption></figure>
  </div>
  <div class="samples">
    <div class="cell"><strong>数字电路与系统设计</strong><span>时间：1-15周 · 双周</span><span>地点：二教319</span><img src="bear-front.png" alt=""></div>
    <div class="cell"><strong>环境经济学</strong><span>时间：1-15周 · 每周</span><span>教师：龙显灵</span><img src="deer.png" alt=""></div>
    <div class="cell"><strong>电子信息学中的机器学习</strong><span>时间：1-15周 · 单周</span><span>地点：理教408</span><img src="robot.png" alt=""></div>
    <div class="cell"><strong>应用物理研究实践</strong><span>时间：1-15周 · 每周</span><span>教师：孙伟</span><img src="chick.png" alt=""></div>
  </div>
</body>
</html>
